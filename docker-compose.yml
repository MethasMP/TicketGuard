services:
  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: booking_guardian
    volumes:
      - db_data:/var/lib/mysql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/seed.sql

  app:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "5080:8080"
    environment:
      DB_CONNECTION_STRING: "server=db;database=booking_guardian;user=dbeaver;password=dbeaver123"
      JWT_SECRET: "change-me-in-production-minimum-32-chars-long-and-secure"
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      - db

volumes:
  db_data:
